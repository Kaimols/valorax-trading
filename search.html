<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ValoraX Suche</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg: #050505;
            --card: #111111;
            --card-light: #181818;
            --text: #ffffff;
            --muted: #666a73;
            --muted-strong: #8e8e93;
            --search: #242426;
            --green: #4ade80;
            --red: #ef4444;
            --border: rgba(255, 255, 255, 0.08);
        }

        body {
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            overflow-x: hidden;
        }

        #app.searchSlideInPage {
            animation: searchSlideInPage 0.28s ease forwards;
        }

        #searchBarWrap.searchSlideInBar {
            animation: searchSlideInBar 0.28s ease forwards;
        }

        @keyframes searchSlideInPage {
            from {
                transform: translateY(100vh);
            }

            to {
                transform: translateY(0);
            }
        }

        @keyframes searchSlideInBar {
            from {
                transform: translateX(-50%) translateY(100vh);
            }

            to {
                transform: translateX(-50%) translateY(0);
            }
        }

        #app {
            width: min(520px, 100%);
            min-height: 100vh;
            margin: 0 auto;
            padding: 0 20px 126px;
            background: var(--bg);
            position: relative;
        }

        #handle {
            width: 56px;
            height: 7px;
            border-radius: 999px;
            background: white;
            margin: 18px auto 46px;
            cursor: pointer;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 72px;
        }

        h1 {
            font-size: 43px;
            font-weight: 900;
            letter-spacing: -1.4px;
            line-height: 1;
        }

        #closeButton {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: var(--muted);
            font-size: 34px;
            font-weight: 700;
            cursor: pointer;
            display: none;
        }

        .categoryList {
            display: grid;
            gap: 38px;
            margin-bottom: 96px;
        }

        .categoryRow {
            display: flex;
            align-items: center;
            gap: 28px;
            cursor: pointer;
        }

        .categoryRow:active {
            transform: scale(0.98);
        }

        .categoryIcon {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: white;
            color: black;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 21px;
            font-weight: 900;
            flex-shrink: 0;
        }

        .categoryRow h2 {
            font-size: 25px;
            font-weight: 900;
            letter-spacing: -0.7px;
        }

        #recentTitle {
            display: none;
            font-size: 26px;
            font-weight: 900;
            letter-spacing: -0.7px;
            margin-bottom: 34px;
        }

        .assetList {
            display: grid;
            gap: 34px;
        }

        #recentList {
            display: none;
        }

        .assetRow {
            display: grid;
            grid-template-columns: 48px 1fr auto;
            align-items: center;
            gap: 22px;
            cursor: pointer;
        }

        .assetRow:active {
            transform: scale(0.98);
        }

        .assetIcon {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #31599f;
            flex-shrink: 0;
            color: white;
            font-size: 22px;
            font-weight: 950;
        }

        .assetIcon img,
        .chipIcon img,
        .moverIcon img,
        .filterCoinIcon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            display: block;
        }

        .logoBgWhite {
            background: white !important;
            color: black !important;
        }

        .logoBgBlack {
            background: #000000 !important;
            color: white !important;
            border: 1px solid var(--border);
        }

        .logoBgGray {
            background: #1d1d1f !important;
            color: white !important;
        }

        .assetInfo {
            min-width: 0;
        }

        .assetInfo h3 {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: -0.7px;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .assetInfo p {
            color: var(--muted);
            font-size: 20px;
            font-weight: 800;
        }

        .assetChange {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: -0.4px;
            white-space: nowrap;
        }

        .assetChange.positive,
        .moverChange.positive,
        .cryptoMarketChange.positive {
            color: var(--green);
        }

        .assetChange.negative,
        .assetChange.blueNegative,
        .moverChange.negative,
        .moverChange.blueNegative,
        .cryptoMarketChange.negative,
        .cryptoMarketChange.blueNegative {
            color: var(--red);
        }

        .assetChange.neutral,
        .moverChange.neutral,
        .cryptoMarketChange.neutral {
            color: var(--muted);
        }

        #resultsTitle {
            display: none;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: -0.7px;
            margin-bottom: 28px;
        }

        #emptyResults {
            display: none;
            color: var(--muted);
            font-size: 18px;
            font-weight: 750;
            margin-top: 24px;
        }

        #cryptoContent {
            display: none;
            padding-top: 18px;
        }

        .cryptoSection {
            margin-bottom: 76px;
        }

        .sectionTitle {
            font-size: 28px;
            font-weight: 950;
            letter-spacing: -0.9px;
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sectionTitle span {
            color: var(--muted);
            font-size: 36px;
            line-height: 1;
        }

        .topMoversScroll {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            scrollbar-width: none;
            margin-right: -20px;
            padding: 0 20px 4px 0;
        }

        .topMoversScroll::-webkit-scrollbar {
            display: none;
        }

        .moverCard {
            min-width: 188px;
            width: 188px;
            height: 146px;
            border-radius: 24px;
            background: var(--card);
            border: 1px solid var(--border);
            padding: 24px 22px 20px;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
        }

        .moverCard:active {
            transform: scale(0.98);
        }

        .moverIcon {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: #1d1d1f;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-bottom: auto;
            color: white;
            font-size: 17px;
            font-weight: 900;
            flex-shrink: 0;
        }

        .moverName {
            font-size: 22px;
            font-weight: 950;
            letter-spacing: -0.7px;
            margin-bottom: 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .moverChange {
            font-size: 22px;
            font-weight: 950;
            letter-spacing: -0.5px;
            white-space: nowrap;
        }

        .popularGrid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .popularChip {
            height: 62px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--card);
            color: white;
            display: flex;
            align-items: center;
            gap: 18px;
            padding: 0 20px;
            cursor: pointer;
            overflow: hidden;
        }

        .popularChip:active {
            transform: scale(0.98);
        }

        .chipIcon {
            width: 31px;
            height: 31px;
            border-radius: 50%;
            background: #1d1d1f;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: white;
            font-size: 17px;
            font-weight: 900;
            flex-shrink: 0;
        }

        .popularChip strong {
            font-size: 20px;
            font-weight: 950;
            letter-spacing: -0.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .cryptoList {
            display: grid;
            gap: 42px;
        }

        .cryptoMarketRow {
            display: grid;
            grid-template-columns: 48px 1fr auto;
            align-items: center;
            gap: 22px;
            cursor: pointer;
        }

        .cryptoMarketRow:active {
            transform: scale(0.98);
        }

        .cryptoMarketRow h3 {
            font-size: 25px;
            font-weight: 950;
            letter-spacing: -0.8px;
        }

        .cryptoMarketChange {
            font-size: 23px;
            font-weight: 950;
            white-space: nowrap;
        }

        #filterContent {
            display: none;
            padding-top: 46px;
        }

        #filterTitle {
            font-size: 48px;
            font-weight: 950;
            letter-spacing: -1.6px;
            margin-bottom: 32px;
        }

        #attributeFilterRow {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 34px;
            overflow: hidden;
        }

        #attributeButton {
            height: 62px;
            border-radius: 21px;
            border: none;
            background: #242426;
            color: white;
            padding: 0 24px;
            font-size: 22px;
            font-weight: 950;
            display: inline-flex;
            align-items: center;
            gap: 18px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .attributeChevron {
            width: 10px;
            height: 10px;
            border-right: 3px solid white;
            border-bottom: 3px solid white;
            transform: rotate(45deg) translateY(-3px);
            display: inline-block;
        }

        #selectedAttributeChips {
            display: flex;
            align-items: center;
            gap: 10px;
            overflow-x: auto;
            scrollbar-width: none;
            min-width: 0;
        }

        #selectedAttributeChips::-webkit-scrollbar {
            display: none;
        }

        .selectedAttributeChip {
            height: 62px;
            border-radius: 21px;
            border: none;
            background: white;
            color: black;
            padding: 0 18px 0 22px;
            display: inline-flex;
            align-items: center;
            gap: 14px;
            font-size: 20px;
            font-weight: 950;
            letter-spacing: -0.5px;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .selectedAttributeChip strong {
            font-size: 26px;
            font-weight: 900;
            line-height: 1;
            margin-top: -2px;
        }

        .selectedAttributeChip:active {
            transform: scale(0.97);
        }

        #filterResultsTitle {
            font-size: 25px;
            font-weight: 950;
            letter-spacing: -0.7px;
            margin-bottom: 42px;
        }

        #filterList {
            display: grid;
            gap: 42px;
            padding-bottom: 40px;
        }

        .filterCoinRow {
            display: grid;
            grid-template-columns: 48px 1fr;
            align-items: center;
            gap: 22px;
            cursor: pointer;
        }

        .filterCoinRow:active {
            transform: scale(0.98);
        }

        .filterCoinIcon {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: #1d1d1f;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 950;
            overflow: hidden;
        }

        .filterCoinRow h3 {
            font-size: 24px;
            font-weight: 950;
            letter-spacing: -0.7px;
        }

        #attributesContent {
            display: none;
            padding-top: 18px;
            padding-bottom: 150px;
        }

        #attributeHandle {
            width: 56px;
            height: 7px;
            border-radius: 999px;
            background: white;
            margin: 18px auto 52px;
            cursor: pointer;
            position: relative;
        }

        #attributeHandle::before {
            content: "";
            position: absolute;
            left: 50%;
            top: -16px;
            transform: translateX(-50%);
            width: 38px;
            height: 7px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.18);
        }

        #attributesTitle {
            font-size: 48px;
            font-weight: 950;
            letter-spacing: -1.6px;
            line-height: 1;
            margin-bottom: 16px;
        }

        #attributesResultCount {
            color: var(--muted);
            font-size: 28px;
            font-weight: 950;
            letter-spacing: -0.9px;
            margin-bottom: 92px;
        }

        #attributeList {
            display: grid;
            gap: 54px;
        }

        .attributeRow {
            display: grid;
            grid-template-columns: 56px 1fr 34px;
            align-items: center;
            gap: 24px;
            cursor: pointer;
        }

        .attributeRow:active {
            transform: scale(0.98);
        }

        .attributeIcon {
            width: 40px;
            height: 40px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .attributeIcon svg {
            width: 38px;
            height: 38px;
            stroke: white;
            fill: none;
            stroke-width: 2.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .attributeRow h3 {
            font-size: 25px;
            font-weight: 950;
            letter-spacing: -0.8px;
        }

        .attributeCheck {
            width: 30px;
            height: 30px;
            border: 3px solid #565a62;
            border-radius: 9px;
            position: relative;
            flex-shrink: 0;
            background: transparent;
        }

        .attributeRow.selected .attributeCheck {
            background: white;
            border-color: white;
        }

        .attributeRow.selected .attributeCheck::after {
            content: "";
            position: absolute;
            left: 50%;
            top: 45%;
            width: 7px;
            height: 14px;
            border-right: 3.5px solid black;
            border-bottom: 3.5px solid black;
            transform: translate(-50%, -50%) rotate(45deg);
        }

        #applyAttributesButton {
            position: fixed;
            left: 50%;
            bottom: 26px;
            transform: translateX(6%);
            width: 230px;
            height: 86px;
            border-radius: 31px;
            border: none;
            background: #5a5a5a;
            color: black;
            font-size: 24px;
            font-weight: 950;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: space-between;
            padding: 0 34px;
            z-index: 80;
        }

        #applyAttributesButton.isActive {
            background: white;
        }

        #applyAttributesButton span {
            width: 24px;
            height: 24px;
            position: relative;
            display: inline-block;
            flex-shrink: 0;
        }

        #applyAttributesButton span::after {
            content: "";
            position: absolute;
            left: 50%;
            top: 43%;
            width: 9px;
            height: 17px;
            border-right: 4px solid black;
            border-bottom: 4px solid black;
            transform: translate(-50%, -50%) rotate(45deg);
        }

        #applyAttributesButton:active {
            transform: translateX(6%) scale(0.97);
        }

        #searchBarWrap {
            position: fixed;
            left: 50%;
            bottom: 24px;
            transform: translateX(-50%);
            width: min(520px, 100%);
            padding: 0 20px;
            z-index: 40;
            display: grid;
            grid-template-columns: 1fr 76px;
            gap: 12px;
            align-items: center;
        }

        .bottomSquare {
            height: 76px;
            border-radius: 25px;
            border: none;
            background: #171719;
            color: white;
            font-size: 38px;
            font-weight: 900;
            cursor: pointer;
        }

        .bottomSquare:active {
            transform: scale(0.97);
        }

        #filterButton {
            color: var(--muted);
            background: #2a2a2d;
            font-size: 28px;
        }

        #searchBar {
            width: 100%;
            height: 76px;
            border-radius: 25px;
            background: #2a2a2d;
            display: flex;
            align-items: center;
            gap: 18px;
            padding: 0 24px;
            min-width: 0;
        }

        #searchIcon {
            color: var(--muted);
            font-size: 34px;
            line-height: 1;
        }

        #searchInput {
            flex: 1;
            min-width: 0;
            height: 100%;
            border: none;
            background: transparent;
            outline: none;
            color: white;
            font-size: 20px;
            font-weight: 850;
        }

        #searchInput::placeholder {
            color: var(--muted);
        }

        @media (min-width: 760px) {
            body {
                background:
                    radial-gradient(circle at top, rgba(34, 197, 94, 0.08), transparent 28%),
                    #000;
            }

            #app {
                border-left: 1px solid var(--border);
                border-right: 1px solid var(--border);
            }
        }

        @media (max-width: 390px) {
            h1 {
                font-size: 39px;
            }

            .categoryRow h2 {
                font-size: 23px;
            }

            .assetInfo h3 {
                font-size: 21px;
            }

            .assetInfo p {
                font-size: 18px;
            }

            .assetChange {
                font-size: 20px;
            }

            .moverCard {
                min-width: 178px;
                width: 178px;
            }

            .moverName {
                font-size: 20px;
            }

            .popularChip strong {
                font-size: 18px;
            }

            #filterContent {
                padding-top: 38px;
            }

            #attributeFilterRow {
                gap: 10px;
            }

            #attributeButton,
            .selectedAttributeChip {
                height: 58px;
                border-radius: 20px;
            }

            #attributeButton {
                font-size: 20px;
                padding: 0 20px;
            }

            .selectedAttributeChip {
                font-size: 18px;
                padding: 0 16px 0 18px;
            }

            #searchBarWrap {
                grid-template-columns: 1fr 66px;
                gap: 10px;
            }

            .bottomSquare,
            #searchBar {
                height: 68px;
                border-radius: 22px;
            }

            #searchInput {
                font-size: 17px;
            }

            #filterTitle {
                font-size: 44px;
            }

            #attributesTitle {
                font-size: 44px;
            }

            #attributesResultCount {
                font-size: 25px;
                margin-bottom: 76px;
            }

            #attributeList {
                gap: 46px;
            }

            .attributeRow {
                grid-template-columns: 50px 1fr 32px;
                gap: 22px;
            }

            .attributeRow h3 {
                font-size: 23px;
            }

            #applyAttributesButton {
                width: 206px;
                height: 76px;
                border-radius: 28px;
                font-size: 22px;
                padding: 0 30px;
            }
        }
    </style>
</head>
<body>

    <div id="app">
        <div id="handle"></div>

        <header id="mainHeader">
            <h1>Suche</h1>
            <button id="closeButton">×</button>
        </header>

        <section id="defaultContent">
            <div class="categoryList">
                <div class="categoryRow" id="cryptoCategory">
                    <div class="categoryIcon">₵</div>
                    <h2>Crypto</h2>
                </div>
            </div>

            <h2 id="recentTitle">Zuletzt gesucht</h2>
            <div class="assetList" id="recentList"></div>
        </section>

        <section id="searchContent">
            <h2 id="resultsTitle">Suchergebnisse</h2>
            <div class="assetList" id="resultsList"></div>
            <div id="emptyResults">Keine Ergebnisse gefunden.</div>
        </section>

        <section id="cryptoContent">
            <section class="cryptoSection">
                <h2 class="sectionTitle">Top movers <span>›</span></h2>
                <div class="topMoversScroll" id="topMoversList"></div>
            </section>

            <section class="cryptoSection">
                <h2 class="sectionTitle">Beliebt</h2>
                <div class="popularGrid" id="popularGrid"></div>
            </section>

            <section class="cryptoSection">
                <h2 class="sectionTitle">Crypto <span>›</span></h2>
                <div class="cryptoList" id="cryptoMarketList"></div>
            </section>
        </section>

        <section id="filterContent">
            <h1 id="filterTitle">Filter</h1>

            <div id="attributeFilterRow">
                <button id="attributeButton">
                    Attribute
                    <span class="attributeChevron"></span>
                </button>

                <div id="selectedAttributeChips"></div>
            </div>

            <h2 id="filterResultsTitle">0 Ergebnisse</h2>

            <div id="filterList"></div>
        </section>

        <section id="attributesContent">
            <div id="attributeHandle"></div>

            <h1 id="attributesTitle">Attribute</h1>
            <div id="attributesResultCount">51 Ergebnisse</div>

            <div id="attributeList">
                <div class="attributeRow" data-attribute="DAO">
                    <div class="attributeIcon">
                        <svg viewBox="0 0 32 32">
                            <path d="M8 6h6v6H8zM18 6h6v6h-6zM12 16h8v6h-8zM7 12v5h5M25 12v5h-5M16 22v4" />
                        </svg>
                    </div>
                    <h3>DAO</h3>
                    <div class="attributeCheck"></div>
                </div>

                <div class="attributeRow" data-attribute="DeFi">
                    <div class="attributeIcon">
                        <svg viewBox="0 0 32 32">
                            <path d="M16 5 5 10l11 5 11-5-11-5zM5 16l11 5 11-5M5 22l11 5 11-5" />
                        </svg>
                    </div>
                    <h3>DeFi</h3>
                    <div class="attributeCheck"></div>
                </div>

                <div class="attributeRow" data-attribute="Gaming">
                    <div class="attributeIcon">
                        <svg viewBox="0 0 32 32">
                            <path d="M9 14h14a6 6 0 0 1 0 12H9a6 6 0 0 1 0-12z" />
                            <path d="M12 18v5M9.5 20.5h5M22 20h.1M25 22h.1M16 14l1-4" />
                        </svg>
                    </div>
                    <h3>Gaming</h3>
                    <div class="attributeCheck"></div>
                </div>

                <div class="attributeRow" data-attribute="NFT">
                    <div class="attributeIcon">
                        <svg viewBox="0 0 32 32">
                            <path d="M9 5h14v22H9zM12 9h8M12 14h8M12 19h5" />
                            <path d="M6 11h3M6 16h3M6 21h3M23 11h3M23 16h3M23 21h3" />
                        </svg>
                    </div>
                    <h3>NFT</h3>
                    <div class="attributeCheck"></div>
                </div>

                <div class="attributeRow" data-attribute="Smart Contracts">
                    <div class="attributeIcon">
                        <svg viewBox="0 0 32 32">
                            <path d="M9 4h11l5 5v19H9z" />
                            <path d="M20 4v6h6M13 22l3-3 3 3 4-5" />
                            <path d="M13 12h7M13 16h5" />
                        </svg>
                    </div>
                    <h3>Smart Contracts</h3>
                    <div class="attributeCheck"></div>
                </div>

                <div class="attributeRow" data-attribute="Sport">
                    <div class="attributeIcon">
                        <svg viewBox="0 0 32 32">
                            <circle cx="16" cy="16" r="12" />
                            <path d="M6 15c5 0 10 3 13 11M12 5c1 8 7 13 16 13M5 20c8-1 13-6 15-14" />
                        </svg>
                    </div>
                    <h3>Sport</h3>
                    <div class="attributeCheck"></div>
                </div>

                <div class="attributeRow" data-attribute="Web3">
                    <div class="attributeIcon">
                        <svg viewBox="0 0 32 32">
                            <path d="M10 7h12a5 5 0 0 1 0 10H10a5 5 0 0 1 0-10z" />
                            <path d="M11 17h10v5a5 5 0 0 1-10 0z" />
                        </svg>
                    </div>
                    <h3>Web3</h3>
                    <div class="attributeCheck"></div>
                </div>

                <div class="attributeRow" data-attribute="Zahlungen">
                    <div class="attributeIcon">
                        <svg viewBox="0 0 32 32">
                            <path d="M4 9h24v14H4z" />
                            <path d="M8 13h7" />
                        </svg>
                    </div>
                    <h3>Zahlungen</h3>
                    <div class="attributeCheck"></div>
                </div>
            </div>
        </section>
    </div>

    <div id="searchBarWrap">
        <div id="searchBar">
            <div id="searchIcon">⌕</div>
            <input id="searchInput" type="text" placeholder="Suche nach Crypto..." autocomplete="off">
        </div>

        <button class="bottomSquare" id="filterButton">≡</button>
    </div>

    <button id="applyAttributesButton">
        Anwenden
        <span></span>
    </button>

    <script src="assets.js"></script>
    <script src="market.js"></script>

    <script>
        const shouldSlideSearchIn = sessionStorage.getItem("valorax_search_slide_in") === "1";
        const shouldOpenFilter = sessionStorage.getItem("valorax_search_open_filter") === "1";
        const searchFilterType = sessionStorage.getItem("valorax_search_filter_type") || "CRYPTO";

        if (shouldSlideSearchIn) {
            sessionStorage.removeItem("valorax_search_slide_in");
        }

        if (shouldOpenFilter) {
            sessionStorage.removeItem("valorax_search_open_filter");
            sessionStorage.removeItem("valorax_search_filter_type");
        }

        const input = document.getElementById("searchInput");
        const handle = document.getElementById("handle");
        const defaultContent = document.getElementById("defaultContent");
        const searchContent = document.getElementById("searchContent");
        const cryptoContent = document.getElementById("cryptoContent");
        const filterContent = document.getElementById("filterContent");
        const attributesContent = document.getElementById("attributesContent");
        const resultsTitle = document.getElementById("resultsTitle");
        const resultsList = document.getElementById("resultsList");
        const emptyResults = document.getElementById("emptyResults");
        const recentTitle = document.getElementById("recentTitle");
        const recentList = document.getElementById("recentList");
        const cryptoMarketList = document.getElementById("cryptoMarketList");
        const topMoversList = document.getElementById("topMoversList");
        const popularGrid = document.getElementById("popularGrid");
        const filterList = document.getElementById("filterList");
        const mainHeader = document.getElementById("mainHeader");
        const searchBarWrap = document.getElementById("searchBarWrap");
        const filterButton = document.getElementById("filterButton");
        const attributeHandle = document.getElementById("attributeHandle");
        const applyAttributesButton = document.getElementById("applyAttributesButton");
        const attributesResultCount = document.getElementById("attributesResultCount");
        const selectedAttributeChips = document.getElementById("selectedAttributeChips");

        if (shouldSlideSearchIn) {
            document.getElementById("app").classList.add("searchSlideInPage");
            searchBarWrap.classList.add("searchSlideInBar");
        }

        let currentView = "DEFAULT";
        let selectedAttributes = [];

        const popularSymbols = ["BTC", "XRP", "SOL", "ETH", "LTC", "ADA"];
        const cryptoPreviewSymbols = ["BTC", "ETH", "XRP"];

        function getChangeDirection(changeClass) {
            if (changeClass === "positive") {
                return "positive";
            }

            if (changeClass === "negative" || changeClass === "blueNegative") {
                return "negative";
            }

            return "neutral";
        }

        function createSearchText(asset) {
            return [
                asset.name,
                asset.symbol,
                asset.typeLabel,
                (asset.attributes || []).join(" "),
                "Crypto Kryptowährung Coin Bitcoin Ethereum Litecoin BTC ETH LTC XRP Cardano Solana"
            ].join(" ");
        }

        function getAssetsFromSharedData() {
            return Object.keys(assetData)
                .filter(function (symbol) {
                    return assetData[symbol].type === "CRYPTO";
                })
                .map(function (symbol) {
                    const asset = assetData[symbol];

                    return {
                        name: asset.name,
                        subtitle: asset.symbol,
                        change: asset.change || "–",
                        direction: getChangeDirection(asset.changeClass),
                        icon: asset.icon,
                        iconBackground: asset.iconBackground || "gray",
                        type: asset.type,
                        attributes: asset.attributes || [],
                        search: createSearchText(asset)
                    };
                });
        }

        function getAssets() {
            return getAssetsFromSharedData();
        }

        function getAssetsFilteredByAttributes() {
            const assets = getAssets();

            if (selectedAttributes.length === 0) {
                return assets;
            }

            return assets.filter(function (asset) {
                return selectedAttributes.some(function (attribute) {
                    return asset.attributes.includes(attribute);
                });
            });
        }

        function getCurrentFilterResults() {
            const query = input.value.trim().toLowerCase();

            return getAssetsFilteredByAttributes().filter(function (asset) {
                if (!query) {
                    return true;
                }

                return asset.name.toLowerCase().includes(query)
                    || asset.subtitle.toLowerCase().includes(query)
                    || asset.search.toLowerCase().includes(query);
            });
        }

        function getAssetBySymbol(symbol) {
            if (!assetData[symbol]) {
                return null;
            }

            const asset = assetData[symbol];

            return {
                name: asset.name,
                subtitle: asset.symbol,
                change: asset.change || "–",
                direction: getChangeDirection(asset.changeClass),
                icon: asset.icon,
                iconBackground: asset.iconBackground || "gray",
                type: asset.type,
                attributes: asset.attributes || [],
                search: createSearchText(asset)
            };
        }

        function getFallbackLetter(name) {
            return String(name || "?").trim().charAt(0).toUpperCase();
        }

        function getIconBackgroundClass(asset) {
            const background = asset.iconBackground || "gray";

            if (background === "white") {
                return "logoBgWhite";
            }

            if (background === "black") {
                return "logoBgBlack";
            }

            return "logoBgGray";
        }

        function getIconHtml(asset, className) {
            const fallback = getFallbackLetter(asset.name);
            const backgroundClass = getIconBackgroundClass(asset);

            if (asset.icon) {
                return `
                    <div class="${className} ${backgroundClass}">
                        <img src="${asset.icon}" alt="${asset.name} Logo" onerror="this.parentElement.textContent='${fallback}';">
                    </div>
                `;
            }

            return `<div class="${className} ${backgroundClass}">${fallback}</div>`;
        }

        function parseChangePercent(changeText) {
            if (!changeText || changeText === "–") {
                return 0;
            }

            const isNegative = String(changeText).includes("▼");
            const number = Number(
                String(changeText)
                    .replace("▲", "")
                    .replace("▼", "")
                    .replace("%", "")
                    .replace(/\s/g, "")
                    .replace(",", ".")
            );

            if (Number.isNaN(number)) {
                return 0;
            }

            return isNegative ? -number : number;
        }

        function resetBottomSearchBar() {
            searchBarWrap.style.display = "grid";
            filterButton.style.display = "block";
            searchBarWrap.style.gridTemplateColumns = window.innerWidth <= 390 ? "1fr 66px" : "1fr 76px";
        }

        function fullBottomSearchBar() {
            searchBarWrap.style.display = "grid";
            filterButton.style.display = "none";
            searchBarWrap.style.gridTemplateColumns = "1fr";
        }

        function hideBottomSearchBar() {
            searchBarWrap.style.display = "none";
        }

        function getRecentSearches() {
            try {
                const recent = JSON.parse(localStorage.getItem("valorax_recent_searches")) || [];

                return recent.filter(function (asset) {
                    return asset.type === "CRYPTO";
                });
            } catch (error) {
                return [];
            }
        }

        function saveRecentSearch(asset) {
            let recent = getRecentSearches();

            recent = recent.filter(function (item) {
                return item.subtitle !== asset.subtitle;
            });

            recent.unshift(asset);

            if (recent.length > 5) {
                recent = recent.slice(0, 5);
            }

            localStorage.setItem("valorax_recent_searches", JSON.stringify(recent));
        }

        function renderRecentSearches() {
            const recent = getRecentSearches();

            recentList.innerHTML = "";

            if (recent.length === 0) {
                recentTitle.style.display = "none";
                recentList.style.display = "none";
                return;
            }

            recentTitle.style.display = "block";
            recentList.style.display = "grid";

            recent.forEach(function (asset) {
                const freshAsset = getAssetBySymbol(asset.subtitle) || asset;
                recentList.appendChild(createAssetRow(freshAsset));
            });
        }

        function createAssetRow(asset) {
            const row = document.createElement("div");
            row.className = "assetRow";

            if (!asset.iconBackground && assetData[asset.subtitle]) {
                asset.iconBackground = assetData[asset.subtitle].iconBackground || "gray";
            }

            row.innerHTML = `
                ${getIconHtml(asset, "assetIcon")}
                <div class="assetInfo">
                    <h3>${asset.name}</h3>
                    <p>${asset.subtitle}</p>
                </div>
                <div class="assetChange ${asset.direction || "neutral"}">${asset.change || "–"}</div>
            `;

            row.onclick = function () {
                saveRecentSearch(asset);
                window.location.href = "asset.html?symbol=" + encodeURIComponent(asset.subtitle);
            };

            return row;
        }

        function hideAllMainViews() {
            mainHeader.style.display = "none";
            defaultContent.style.display = "none";
            searchContent.style.display = "none";
            cryptoContent.style.display = "none";
            filterContent.style.display = "none";
            attributesContent.style.display = "none";
            applyAttributesButton.style.display = "none";
        }

        function showDefaultView() {
            currentView = "DEFAULT";

            hideAllMainViews();

            handle.style.display = "block";
            mainHeader.style.display = "flex";
            defaultContent.style.display = "block";
            searchContent.style.display = "block";

            resultsTitle.style.display = "none";
            resultsList.innerHTML = "";
            emptyResults.style.display = "none";
            input.value = "";

            resetBottomSearchBar();
            renderRecentSearches();
        }

        function showCryptoTab() {
            currentView = "CRYPTO";

            hideAllMainViews();

            handle.style.display = "block";
            cryptoContent.style.display = "block";
            input.value = "";

            resetBottomSearchBar();
            renderTopMovers();
            renderPopularCoins();
            renderCryptoMarketList();
        }

        function showFilterView() {
            currentView = "FILTER";

            hideAllMainViews();

            handle.style.display = "none";
            filterContent.style.display = "block";

            input.value = "";
            fullBottomSearchBar();
            renderSelectedAttributeChips();
            renderFilterList(getAssetsFilteredByAttributes());
        }

        function showAttributesView() {
            currentView = "ATTRIBUTES";

            hideAllMainViews();

            handle.style.display = "none";
            attributesContent.style.display = "block";
            applyAttributesButton.style.display = "flex";
            hideBottomSearchBar();

            syncAttributeRows();
            updateAttributesResultCount();
            updateApplyAttributesButton();
        }

        function updateApplyAttributesButton() {
            applyAttributesButton.classList.toggle("isActive", selectedAttributes.length > 0);
        }

        function updateAttributesResultCount() {
            const count = getAssetsFilteredByAttributes().length;
            attributesResultCount.textContent = count + " Ergebnisse";
        }

        function syncAttributeRows() {
            document.querySelectorAll(".attributeRow").forEach(function (row) {
                row.classList.toggle("selected", selectedAttributes.includes(row.dataset.attribute));
            });
        }

        function renderSelectedAttributeChips() {
            selectedAttributeChips.innerHTML = "";

            selectedAttributes.forEach(function (attribute) {
                const chip = document.createElement("button");
                chip.type = "button";
                chip.className = "selectedAttributeChip";

                chip.innerHTML = `
                    <span>${attribute}</span>
                    <strong>×</strong>
                `;

                chip.onclick = function (event) {
                    event.stopPropagation();
                    removeSelectedAttribute(attribute);
                };

                selectedAttributeChips.appendChild(chip);
            });
        }

        function removeSelectedAttribute(attribute) {
            selectedAttributes = selectedAttributes.filter(function (item) {
                return item !== attribute;
            });

            syncAttributeRows();
            updateAttributesResultCount();
            updateApplyAttributesButton();
            renderSelectedAttributeChips();

            if (currentView === "FILTER") {
                renderFilterList(getCurrentFilterResults());
            }
        }

        function renderTopMovers() {
            const movers = getAssets()
                .slice()
                .sort(function (a, b) {
                    return Math.abs(parseChangePercent(b.change)) - Math.abs(parseChangePercent(a.change));
                })
                .slice(0, 8);

            topMoversList.innerHTML = "";

            movers.forEach(function (asset) {
                const card = document.createElement("div");
                card.className = "moverCard";

                card.innerHTML = `
                    ${getIconHtml(asset, "moverIcon")}
                    <div class="moverName">${asset.name}</div>
                    <div class="moverChange ${asset.direction}">${asset.change}</div>
                `;

                card.onclick = function () {
                    openSymbol(asset.subtitle);
                };

                topMoversList.appendChild(card);
            });
        }

        function renderPopularCoins() {
            popularGrid.innerHTML = "";

            popularSymbols.forEach(function (symbol) {
                const asset = getAssetBySymbol(symbol);

                if (!asset) {
                    return;
                }

                const chip = document.createElement("div");
                chip.className = "popularChip";

                chip.innerHTML = `
                    ${getIconHtml(asset, "chipIcon")}
                    <strong>${asset.name}</strong>
                `;

                chip.onclick = function () {
                    openSymbol(symbol);
                };

                popularGrid.appendChild(chip);
            });
        }

        function renderCryptoMarketList() {
            cryptoMarketList.innerHTML = "";

            cryptoPreviewSymbols.forEach(function (symbol) {
                const asset = getAssetBySymbol(symbol);

                if (!asset) {
                    return;
                }

                const row = document.createElement("div");
                row.className = "cryptoMarketRow";

                row.innerHTML = `
                    ${getIconHtml(asset, "assetIcon")}
                    <h3>${asset.name}</h3>
                    <div class="cryptoMarketChange ${asset.direction}">
                        ${asset.change}
                    </div>
                `;

                row.onclick = function () {
                    openSymbol(symbol);
                };

                cryptoMarketList.appendChild(row);
            });
        }

        function renderFilterList(items) {
            filterList.innerHTML = "";

            document.getElementById("filterResultsTitle").textContent = items.length + " Ergebnisse";

            items.forEach(function (asset) {
                const row = document.createElement("div");
                row.className = "filterCoinRow";

                row.innerHTML = `
                    ${getIconHtml(asset, "filterCoinIcon")}
                    <h3>${asset.name}</h3>
                `;

                row.onclick = function () {
                    openSymbol(asset.subtitle);
                };

                filterList.appendChild(row);
            });
        }

        function runSearch() {
            const query = input.value.trim().toLowerCase();

            if (currentView === "FILTER") {
                renderFilterList(getCurrentFilterResults());
                return;
            }

            resultsList.innerHTML = "";

            if (!query) {
                if (currentView === "CRYPTO") {
                    searchContent.style.display = "none";
                    cryptoContent.style.display = "block";
                    renderTopMovers();
                    renderPopularCoins();
                    renderCryptoMarketList();
                    return;
                }

                defaultContent.style.display = "block";
                searchContent.style.display = "block";
                resultsTitle.style.display = "none";
                emptyResults.style.display = "none";
                renderRecentSearches();
                return;
            }

            cryptoContent.style.display = "none";
            defaultContent.style.display = "none";
            searchContent.style.display = "block";
            resultsTitle.style.display = "block";

            const results = getAssets().filter(function (asset) {
                return asset.search.toLowerCase().includes(query)
                    || asset.name.toLowerCase().includes(query)
                    || asset.subtitle.toLowerCase().includes(query);
            });

            if (results.length === 0) {
                emptyResults.style.display = "block";
                return;
            }

            emptyResults.style.display = "none";

            results.forEach(function (asset) {
                resultsList.appendChild(createAssetRow(asset));
            });
        }

        function openSymbol(symbol) {
            if (!assetData[symbol]) {
                alert("Dieser Coin kommt als nächstes.");
                return;
            }

            const asset = getAssetBySymbol(symbol);

            if (!asset) {
                return;
            }

            saveRecentSearch(asset);
            window.location.href = "asset.html?symbol=" + encodeURIComponent(symbol);
        }

        document.getElementById("cryptoCategory").onclick = function () {
            showCryptoTab();
        };

        document.getElementById("handle").onclick = function () {
            if (currentView === "ATTRIBUTES") {
                showFilterView();
                return;
            }

            if (currentView === "FILTER") {
                showCryptoTab();
                return;
            }

            window.location.href = "dashboard.html";
        };

        document.getElementById("closeButton").onclick = function () {
            window.location.href = "dashboard.html";
        };

        document.getElementById("filterButton").onclick = function () {
            showFilterView();
        };

        document.getElementById("attributeButton").onclick = function () {
            showAttributesView();
        };

        document.querySelectorAll(".attributeRow").forEach(function (row) {
            row.onclick = function () {
                const value = row.dataset.attribute;

                if (selectedAttributes.includes(value)) {
                    selectedAttributes = selectedAttributes.filter(function (item) {
                        return item !== value;
                    });
                } else {
                    selectedAttributes.push(value);
                }

                syncAttributeRows();
                updateAttributesResultCount();
                updateApplyAttributesButton();
                renderSelectedAttributeChips();
            };
        });

        attributeHandle.onclick = function () {
            showFilterView();
        };

        applyAttributesButton.onclick = function () {
            showFilterView();
        };

        input.addEventListener("input", runSearch);

        document.addEventListener("keydown", function (event) {
            if (event.key === "Escape") {
                if (currentView === "ATTRIBUTES") {
                    showFilterView();
                    return;
                }

                if (currentView === "FILTER") {
                    showCryptoTab();
                    return;
                }

                window.location.href = "dashboard.html";
            }
        });

        if (shouldOpenFilter && searchFilterType === "CRYPTO") {
            showFilterView();
        } else {
            renderRecentSearches();
        }

        if (typeof startCryptoMarketUpdates === "function") {
            startCryptoMarketUpdates(function () {
                if (currentView === "CRYPTO") {
                    renderTopMovers();
                    renderPopularCoins();
                    renderCryptoMarketList();
                }

                if (currentView === "FILTER") {
                    runSearch();
                }

                if (currentView === "ATTRIBUTES") {
                    updateAttributesResultCount();
                }

                if (input.value.trim() && currentView !== "FILTER" && currentView !== "ATTRIBUTES") {
                    runSearch();
                }
            });
        }

        setTimeout(function () {
            input.focus();
        }, 300);
    </script>

</body>
</html>
